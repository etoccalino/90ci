<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>90ci — Hi-Fi Directions</title>
<style>
  html,body{ margin:0; height:100%; background:#f0eee9; }
  #root{ height:100vh; }
  iframe.design{ width:1280px; height:840px; border:0; display:block; background:#fff; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel" src="design-canvas.jsx"></script>
  <script type="text/babel">
    const { DesignCanvas, DCSection, DCArtboard } = window;
    const W = 1280, H = 840;
    const board = (id, label, src) => (
      <DCArtboard id={id} label={label} width={W} height={H}>
        <iframe className="design" src={src} title={label} loading="eager"></iframe>
      </DCArtboard>
    );
    function App(){
      return (
        <DesignCanvas>
          <DCSection id="workbench" title="90ci · Workbench" subtitle="Four hi-fi looks of the same calculator — double-click any board to open it fullscreen. Same model & data throughout.">
            {board('spreadsheet', 'A · Spreadsheet (Notion-style)', 'designs/01-spreadsheet.html')}
            {board('crt',         'B · 80s CRT terminal',           'designs/02-crt.html')}
            {board('spaceship',   'C · Spaceship HUD',              'designs/03-spaceship.html')}
            {board('djconsole',   'D · DJ console',                 'designs/04-djconsole.html')}
          </DCSection>
        </DesignCanvas>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
